name: Deploy to User Site Root

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: user-site-root
  cancel-in-progress: true

jobs:
  deploy-root:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Build static client for root URL
        env:
          VITE_BASE_PATH: /
        run: npm run build

      - name: Publish dist/client to user site repository
        env:
          USER_SITE_DEPLOY_TOKEN: ${{ secrets.USER_SITE_DEPLOY_TOKEN }}
          USER_SITE_REPO: ${{ vars.USER_SITE_REPO || 'LordDz/lorddz.github.io' }}
          USER_SITE_BRANCH: ${{ vars.USER_SITE_BRANCH || 'main' }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          if [ -z "$USER_SITE_DEPLOY_TOKEN" ]; then
            echo "Missing secret USER_SITE_DEPLOY_TOKEN."
            echo "Create a token with contents write access to ${USER_SITE_REPO} and store it as this secret."
            exit 1
          fi

          git clone "https://x-access-token:${USER_SITE_DEPLOY_TOKEN}@github.com/${USER_SITE_REPO}.git" user-site
          cd user-site
          git checkout "${USER_SITE_BRANCH}" || git checkout -b "${USER_SITE_BRANCH}"

          rm -rf ./*
          cp -R ../dist/client/. ./
          touch .nojekyll

          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes to deploy."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Deploy from website@${GITHUB_SHA}"
          git push origin "HEAD:${USER_SITE_BRANCH}"
