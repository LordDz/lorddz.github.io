name: Publish docs for branch Pages deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  publish-docs:
    if: github.actor != 'github-actions[bot]' && (github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: master
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Build static client
        env:
          VITE_BASE_PATH: ${{ vars.VITE_BASE_PATH || '/' }}
        run: npm run build
      - name: Publish build to docs
        run: |
          rm -rf docs
          mkdir -p docs
          cp -R dist/client/. docs/
          touch docs/.nojekyll
      - name: Commit docs changes
        run: |
          git add docs
          if git diff --staged --quiet; then
            echo "No docs changes to commit."
            exit 0
          fi
          git -c user.name='github-actions[bot]' -c user.email='41898282+github-actions[bot]@users.noreply.github.com' commit -m "chore: publish docs [skip ci]"
          git push origin HEAD:master
